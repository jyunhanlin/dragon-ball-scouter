<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <title>戰鬥力探測器</title>
  </head>
  <body>
    <div id="app">
      <video id="cam" autoplay playsinline muted></video>
      <!-- 染金層：必須在 #cam 與 hair3d canvas（動態插在 #hud 前）之間，髮束才能疊在金髮上 -->
      <canvas id="tint" hidden></canvas>
      <canvas id="hud"></canvas>
      <div id="start-overlay">
        <h1>戰鬥力探測器</h1>
        <pre id="boot-log" aria-live="polite"></pre>
        <button id="start-btn" disabled>啟動</button>
      </div>
      <div id="error-box" hidden>
        <p id="error-msg"></p>
        <button id="retry-btn">重試</button>
      </div>
      <button id="flip-btn" title="切換鏡頭" aria-label="切換鏡頭">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M4 12a8 8 0 0 1 13.66-5.66" />
          <polyline points="18.5 2.5 18.5 7 14 7" />
          <path d="M20 12a8 8 0 0 1-13.66 5.66" />
          <polyline points="5.5 21.5 5.5 17 10 17" />
        </svg>
      </button>
      <button id="restart-btn" hidden>重新啟動</button>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
